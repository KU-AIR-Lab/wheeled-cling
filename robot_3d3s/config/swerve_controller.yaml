controller_manager:
  ros__parameters:
    update_rate: 10  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    swerve_controller:
      type: swerve_controller/SwerveController

swerve_controller:
  ros__parameters:
    wheel_1_joint: "wheel_1_joint"
    wheel_2_joint: "wheel_2_joint"
    wheel_3_joint: "wheel_3_joint"
    steering_1_joint: "steering_1_joint"
    steering_2_joint: "steering_2_joint"
    steering_3_joint: "steering_3_joint"
    robot_circumradius: 0.389
    wheel_radius: 0.05
    cmd_vel_timeout: 0.5
    use_stamped_vel: true 
    
